name: Deploy to GitHub Pages

on:
  # Запуск при пуше в основные ветки
  push:
    branches:
      - main
      - master
  # Позволяет запускать workflow вручную из вкладки Actions
  workflow_dispatch:

# Настройка разрешений GITHUB_TOKEN для публикации на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Разрешить только одно одновременное развертывание
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        # Устанавливаем base path равным имени репозитория для корректной загрузки ассетов (CSS/JS)
        run: npm run build -- --base=/${{ github.event.repository.name }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
